services:
  mongodb:
    image: mongo
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: tajer
      MONGO_INITDB_ROOT_PASSWORD: pass123

  mongoexpress:
    image: mongo-express
    ports:
      - 9000:8081
    # networks: in docker compose file we don't needed define network because docker compose automatically creates a default network for the services. so we can remove the networks section from the mongoexpress service.
    #   - mongo-network
    environment:
      Me_CONFIG_BASICAUTH_USERNAME: tajer
      Me_CONFIG_BASICAUTH_PASSWORD: pass123
      ME_CONFIG_MONGODB_ADMINUSERNAME: tajer
      ME_CONFIG_MONGODB_ADMINPASSWORD: pass123
      ME_CONFIG_MONGODB_SERVER: mongodb
